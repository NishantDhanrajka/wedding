<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruhi & Nishant &mdash; Wedding Invitation</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@300;400;500&family=Cinzel:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #2d1010;
            font-family: 'Cormorant Garamond', serif;
            overflow-x: hidden;
        }

        /* Card-lift entrance for the whole invitation */
        .invitation {
            width: 100%;
            max-width: 500px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 30px;
            background: radial-gradient(ellipse at center, #5c2020 0%, #3d1414 40%, #2d1010 70%, #1f0a0a 100%);
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(30px) scale(0.96) rotateX(4deg);
            transform-origin: 50% 30%;
            animation: cardLift 1.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6), 0 0 60px rgba(201, 160, 48, 0.08);
        }

        @keyframes cardLift {
            to { opacity: 1; transform: translateY(0) scale(1) rotateX(0deg); }
        }

        /* Pulse rings behind the content */
        .invitation::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 350px;
            height: 350px;
            border: 1px solid rgba(180, 160, 80, 0.08);
            border-radius: 50%;
            animation: pulseRing 4s ease-in-out infinite;
            pointer-events: none;
        }

        .invitation::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            height: 500px;
            border: 1px solid rgba(180, 160, 80, 0.05);
            border-radius: 50%;
            animation: pulseRing 4s ease-in-out infinite 1s;
            pointer-events: none;
        }

        @keyframes pulseRing {
            0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.05); }
        }

        /* ---- Corner paisley motifs on the card edges ---- */
        .card-corner {
            position: absolute;
            width: 42px;
            height: 42px;
            pointer-events: none;
            opacity: 0;
            animation: cornerFade 1.2s ease-out 1.6s forwards;
        }
        .card-corner.tl { top: 18px; left: 18px; }
        .card-corner.tr { top: 18px; right: 18px; transform: scaleX(-1); }
        .card-corner.bl { bottom: 18px; left: 18px; transform: scaleY(-1); }
        .card-corner.br { bottom: 18px; right: 18px; transform: scale(-1); }

        .card-corner svg { width: 100%; height: 100%; overflow: visible; }
        .card-corner svg path,
        .card-corner svg circle {
            fill: none;
            stroke: #c9a030;
            stroke-width: 1;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0 0 4px rgba(201, 160, 48, 0.5));
        }
        .card-corner svg circle.filled { fill: #d4a734; stroke: none; }

        @keyframes cornerFade {
            to { opacity: 0.85; }
        }

        /* ---- Toran garland hanging from the top of the card ---- */
        .toran {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            pointer-events: none;
            z-index: 3;
            transform-origin: top center;
            animation: toranSway 6s ease-in-out infinite;
            opacity: 0;
            animation: toranFadeSway 6s ease-in-out infinite, toranFadeIn 1s ease 0.5s forwards;
        }

        @keyframes toranFadeIn { to { opacity: 1; } }

        @keyframes toranFadeSway {
            0%, 100% { transform: rotate(-1deg); }
            50% { transform: rotate(1deg); }
        }

        .toran svg { width: 100%; height: 100%; }

        .marigold {
            transform-origin: center top;
            animation: marigoldBob 3s ease-in-out infinite;
        }
        .marigold:nth-child(odd) { animation-delay: -1.5s; }

        @keyframes marigoldBob {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(3px) rotate(2deg); }
        }

        /* ---- Diya row at the bottom of the card ---- */
        .diya-row {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 0 24px 12px;
            pointer-events: none;
            z-index: 2;
        }

        .diya {
            position: relative;
            width: 34px;
            height: 44px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            opacity: 0;
            animation: diyaGlow 3s ease-in-out infinite, diyaFadeIn 1.4s ease forwards;
        }

        .diya:nth-child(1) { animation-delay: 0.2s, 1.0s; }
        .diya:nth-child(2) { animation-delay: 0.8s, 1.15s; }
        .diya:nth-child(3) { animation-delay: 1.4s, 1.3s; }
        .diya:nth-child(4) { animation-delay: 0.5s, 1.45s; }
        .diya:nth-child(5) { animation-delay: 1.1s, 1.6s; }

        @keyframes diyaFadeIn { to { opacity: 1; } }

        @keyframes diyaGlow {
            0%, 100% { filter: drop-shadow(0 0 6px rgba(255, 180, 80, 0.55)); }
            50%      { filter: drop-shadow(0 0 14px rgba(255, 200, 100, 0.85)); }
        }

        .diya-bowl {
            width: 28px;
            height: 12px;
            background: linear-gradient(180deg, #8a4a1a 0%, #5a2a0a 55%, #3a1a05 100%);
            border-radius: 0 0 50% 50% / 0 0 100% 100%;
            position: relative;
            box-shadow: inset 0 -4px 6px rgba(0, 0, 0, 0.55), 0 2px 4px rgba(0, 0, 0, 0.45);
        }
        .diya-bowl::before {
            content: '';
            position: absolute;
            top: -2px;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #a06030, #d4a734, #a06030);
            border-radius: 2px;
        }

        .diya-flame {
            position: absolute;
            bottom: 10px;
            width: 9px;
            height: 15px;
            background: radial-gradient(ellipse at 50% 80%, #fff8c0 0%, #ffd060 32%, #ff8020 62%, transparent 92%);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            transform-origin: 50% 100%;
            animation: flameFlicker 0.16s ease-in-out infinite alternate;
            filter: blur(0.3px);
        }

        @keyframes flameFlicker {
            0%   { transform: scale(0.95, 1) rotate(-2deg); opacity: 0.9; }
            100% { transform: scale(1.05, 1.08) rotate(2deg); opacity: 1; }
        }

        /* ---- Falling petals ---- */
        .petal-container {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .petal {
            position: absolute;
            width: 10px;
            height: 10px;
            background: radial-gradient(ellipse, #f0b070 0%, #c07020 100%);
            border-radius: 50% 0 50% 50%;
            opacity: 0;
            animation: petalFall 12s linear infinite;
        }

        .petal:nth-child(1) { left: 8%;  animation-delay: 0s;   animation-duration: 12s; }
        .petal:nth-child(2) { left: 22%; animation-delay: 2s;   animation-duration: 9s; }
        .petal:nth-child(3) { left: 38%; animation-delay: 4s;   animation-duration: 11s; }
        .petal:nth-child(4) { left: 55%; animation-delay: 1s;   animation-duration: 10s; }
        .petal:nth-child(5) { left: 70%; animation-delay: 3s;   animation-duration: 13s; }
        .petal:nth-child(6) { left: 85%; animation-delay: 5s;   animation-duration: 9.5s; }
        .petal:nth-child(7) { left: 15%; animation-delay: 6s;   animation-duration: 11.5s; }
        .petal:nth-child(8) { left: 62%; animation-delay: 7s;   animation-duration: 10.5s; }

        @keyframes petalFall {
            0%   { transform: translateY(-30px) rotate(0deg) scale(0.8); opacity: 0; }
            10%  { opacity: 0.6; }
            90%  { opacity: 0.35; }
            100% { transform: translateY(110vh) rotate(360deg) scale(0.4); opacity: 0; }
        }

        /* ---- Gold dust drifting upward ---- */
        .dust-container {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .dust {
            position: absolute;
            width: 2.5px;
            height: 2.5px;
            background: radial-gradient(circle, #fff8d0 0%, #d4a734 55%, transparent 100%);
            border-radius: 50%;
            opacity: 0;
            box-shadow: 0 0 4px rgba(255, 220, 140, 0.8);
            animation: dustDrift 14s linear infinite;
        }

        .dust:nth-child(1)  { left: 6%;  top: 90%; animation-delay: 0s;   animation-duration: 12s; }
        .dust:nth-child(2)  { left: 14%; top: 95%; animation-delay: 1.5s; animation-duration: 10s; }
        .dust:nth-child(3)  { left: 26%; top: 88%; animation-delay: 3s;   animation-duration: 14s; }
        .dust:nth-child(4)  { left: 38%; top: 96%; animation-delay: 2s;   animation-duration: 11s; }
        .dust:nth-child(5)  { left: 50%; top: 92%; animation-delay: 4.5s; animation-duration: 13s; }
        .dust:nth-child(6)  { left: 62%; top: 89%; animation-delay: 1s;   animation-duration: 9s;  }
        .dust:nth-child(7)  { left: 74%; top: 94%; animation-delay: 5.5s; animation-duration: 15s; }
        .dust:nth-child(8)  { left: 86%; top: 91%; animation-delay: 3.5s; animation-duration: 12.5s; }
        .dust:nth-child(9)  { left: 30%; top: 85%; animation-delay: 6s;   animation-duration: 10.5s; }
        .dust:nth-child(10) { left: 68%; top: 87%; animation-delay: 7s;   animation-duration: 11.5s; }
        .dust:nth-child(11) { left: 44%; top: 98%; animation-delay: 2.8s; animation-duration: 13.5s; }
        .dust:nth-child(12) { left: 92%; top: 84%; animation-delay: 4s;   animation-duration: 10s; }

        @keyframes dustDrift {
            0%   { transform: translate(0, 0) scale(1); opacity: 0; }
            15%  { opacity: 0.85; }
            50%  { transform: translate(15px, -50vh) scale(1.4); opacity: 0.6; }
            100% { transform: translate(-10px, -100vh) scale(0.4); opacity: 0; }
        }

        /* ---- Photo peek — small circular bride-groom thumbnail ---- */
        .photo-peek {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid rgba(201, 160, 48, 0.7);
            box-shadow:
                0 8px 20px rgba(0, 0, 0, 0.5),
                0 0 20px rgba(201, 160, 48, 0.25),
                inset 0 0 12px rgba(201, 160, 48, 0.15);
            position: relative;
            z-index: 2;
            margin-bottom: 20px;
            opacity: 0;
            transform: scale(0.7);
            animation: photoPeekIn 1.2s cubic-bezier(0.34, 1.3, 0.64, 1) 0.2s forwards;
        }

        .photo-peek img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        @keyframes photoPeekIn {
            to { opacity: 1; transform: scale(1); }
        }

        /* ---- Ornaments (draw-on) ---- */
        .ornament {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 280px;
            height: 30px;
            position: relative;
            z-index: 1;
        }

        .ornament svg {
            width: 100%;
            height: 100%;
        }

        .ornament svg path,
        .ornament svg line {
            stroke-dasharray: 260;
            stroke-dashoffset: 260;
            animation: ornamentDraw 2s ease-out 0.6s forwards;
        }

        .ornament svg circle {
            opacity: 0;
            animation: ornamentDotFade 0.5s ease 2.2s forwards;
        }

        .ornament-bottom svg path,
        .ornament-bottom svg line {
            animation-delay: 2.6s;
        }

        .ornament-bottom svg circle {
            animation-delay: 3.6s;
        }

        @keyframes ornamentDraw {
            to { stroke-dashoffset: 0; }
        }

        @keyframes ornamentDotFade {
            to { opacity: 1; }
        }

        .heading {
            font-family: 'Cinzel', serif;
            font-size: 13px;
            font-weight: 400;
            letter-spacing: 4px;
            color: #c9b96e;
            text-align: center;
            margin-top: 20px;
            line-height: 1.8;
            opacity: 0;
            animation: fadeSlideDown 1s ease forwards 0.9s;
            position: relative;
            z-index: 1;
        }

        .names {
            text-align: center;
            margin: 20px 0;
            position: relative;
            z-index: 1;
        }

        /* ---- Split-letter names with gold foil shine ---- */
        .name {
            font-family: 'Great Vibes', cursive;
            font-size: 72px;
            display: block;
            line-height: 1;
            position: relative;
            overflow: visible;
            padding: 0 0.05em;
        }

        .name-letter {
            display: inline-block;
            opacity: 0;
            transform: translateY(-40px) rotateX(90deg) scale(0.5);
            transform-origin: 50% 100%;
            color: #f5e59a;
            text-shadow:
                0 1px 0 #b8922a,
                0 2px 2px rgba(90, 60, 10, 0.5),
                0 0 12px rgba(245, 229, 154, 0.4),
                0 0 22px rgba(212, 167, 52, 0.25);
            transition: opacity 0.6s ease, transform 0.9s cubic-bezier(0.34, 1.4, 0.64, 1);
        }

        .name-letter.revealed {
            opacity: 1;
            transform: translateY(0) rotateX(0deg) scale(1);
        }

        /* Gold foil shine sweep across each name */
        .name::after {
            content: '';
            position: absolute;
            top: 0;
            left: -20%;
            width: 30%;
            height: 100%;
            background: linear-gradient(100deg, transparent 0%, rgba(255, 248, 208, 0.5) 50%, transparent 100%);
            filter: blur(6px);
            pointer-events: none;
            opacity: 0;
            animation: nameShine 6s ease-in-out infinite;
        }

        .name.name-second::after {
            animation-delay: 3s;
        }

        @keyframes nameShine {
            /* Sweep stays inside the name's own width (0 → 233% covers a 30%-wide
               shine crossing a 100%-wide name) so it can't push the page width. */
            0%, 100% { transform: translateX(-30%); opacity: 0; }
            35% { opacity: 1; }
            65% { opacity: 1; }
            100% { transform: translateX(233%); opacity: 0; }
        }

        .ampersand {
            font-family: 'Great Vibes', cursive;
            font-size: 36px;
            color: #c9a030;
            display: block;
            margin: -5px 0;
            opacity: 0;
            animation: fadeScale 1s ease forwards 1.9s;
            text-shadow: 0 0 12px rgba(201, 160, 48, 0.6);
        }

        .date {
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
            font-weight: 300;
            color: #a89860;
            letter-spacing: 2px;
            margin-top: 15px;
            opacity: 0;
            animation: fadeIn 1s ease forwards 2.4s;
            position: relative;
            z-index: 1;
        }

        .ornament-bottom {
            margin-top: 30px;
            opacity: 1;
            position: relative;
            z-index: 1;
        }

        .buttons {
            margin-top: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            width: 100%;
            max-width: 320px;
            opacity: 0;
            animation: fadeSlideUp 1s ease forwards 3s;
            position: relative;
            z-index: 10;
        }

        .btn {
            width: 100%;
            padding: 16px 40px;
            font-family: 'Cinzel', serif;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 3px;
            text-transform: uppercase;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            text-align: center;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #d4a734, #b8922a, #d4a734);
            background-size: 200% 200%;
            color: #1a1a0a;
            border: none;
            box-shadow: 0 4px 15px rgba(200, 160, 40, 0.3);
            animation: shimmer 3s ease infinite;
        }

        .btn-primary:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 25px rgba(200, 160, 40, 0.5);
        }

        .btn-primary:active {
            transform: translateY(0) scale(0.98);
        }

        .btn-secondary {
            background: transparent;
            color: #c9a030;
            border: 1.5px solid #c9a030;
        }

        .btn-secondary:hover {
            background: rgba(201, 160, 48, 0.1);
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 4px 15px rgba(200, 160, 40, 0.2);
        }

        .btn-secondary:active {
            transform: translateY(0) scale(0.98);
        }

        .music-note {
            font-size: 16px;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeSlideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeScale {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes shimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @media (max-width: 480px) {
            .invitation { padding: 70px 26px 90px; }
            .heading {
                font-size: 12px;
                letter-spacing: 4px;
                margin-top: 24px;
            }
            .name { font-size: 62px; }
            .ampersand { font-size: 32px; }
            .date { font-size: 17px; margin-top: 18px; }
            .buttons {
                margin-top: 60px;
                max-width: 300px;
                gap: 16px;
            }
            .btn {
                padding: 15px 30px;
                font-size: 13px;
                letter-spacing: 3px;
            }
            .card-corner { width: 34px; height: 34px; }
            .card-corner.tl { top: 14px; left: 14px; }
            .card-corner.tr { top: 14px; right: 14px; }
            .card-corner.bl { bottom: 14px; left: 14px; }
            .card-corner.br { bottom: 14px; right: 14px; }
            .toran { height: 62px; }
            .diya { width: 32px; height: 42px; }
            .diya-bowl { width: 26px; height: 12px; }
            .diya-flame { width: 8px; height: 14px; bottom: 10px; }
        }

        @media (max-width: 360px) {
            .invitation { padding: 60px 22px 80px; }
            .name { font-size: 54px; }
            .heading { font-size: 11px; letter-spacing: 3px; }
            .btn { padding: 14px 24px; font-size: 12px; letter-spacing: 2.5px; }
        }
    </style>
</head>
<body>
    <div class="invitation">
        <!-- Toran garland hanging from the top -->
        <svg class="toran" viewBox="0 0 500 70" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M0 6 Q50 34 100 16 Q150 34 200 14 Q250 36 300 16 Q350 34 400 14 Q450 34 500 6" stroke="#6a4a1a" stroke-width="1.2" fill="none"/>
            <g class="marigold" transform="translate(50 34)"><circle r="9" fill="#e8801a"/><circle r="5" fill="#f5a030"/><circle r="2.5" fill="#c95010"/></g>
            <path d="M55 42 L46 62 L60 62 Z" fill="#2a5020"/>
            <g class="marigold" transform="translate(100 18)"><circle r="8" fill="#e8801a"/><circle r="4" fill="#f5a030"/></g>
            <g class="marigold" transform="translate(150 36)"><circle r="9" fill="#e8801a"/><circle r="5" fill="#f5a030"/><circle r="2.5" fill="#c95010"/></g>
            <path d="M155 44 L146 64 L160 64 Z" fill="#2a5020"/>
            <g class="marigold" transform="translate(200 16)"><circle r="8" fill="#e8801a"/><circle r="4" fill="#f5a030"/></g>
            <g class="marigold" transform="translate(250 38)"><circle r="10" fill="#f5a030"/><circle r="6" fill="#e8801a"/><circle r="2.5" fill="#c95010"/></g>
            <path d="M255 46 L244 66 L262 66 Z" fill="#2a5020"/>
            <g class="marigold" transform="translate(300 18)"><circle r="8" fill="#e8801a"/><circle r="4" fill="#f5a030"/></g>
            <g class="marigold" transform="translate(350 36)"><circle r="9" fill="#e8801a"/><circle r="5" fill="#f5a030"/><circle r="2.5" fill="#c95010"/></g>
            <path d="M355 44 L346 64 L360 64 Z" fill="#2a5020"/>
            <g class="marigold" transform="translate(400 16)"><circle r="8" fill="#e8801a"/><circle r="4" fill="#f5a030"/></g>
            <g class="marigold" transform="translate(450 34)"><circle r="9" fill="#e8801a"/><circle r="5" fill="#f5a030"/><circle r="2.5" fill="#c95010"/></g>
        </svg>

        <!-- Falling petals -->
        <div class="petal-container" aria-hidden="true">
            <div class="petal"></div>
            <div class="petal"></div>
            <div class="petal"></div>
            <div class="petal"></div>
            <div class="petal"></div>
            <div class="petal"></div>
            <div class="petal"></div>
            <div class="petal"></div>
        </div>

        <!-- Gold dust drifting upward -->
        <div class="dust-container" aria-hidden="true">
            <div class="dust"></div>
            <div class="dust"></div>
            <div class="dust"></div>
            <div class="dust"></div>
            <div class="dust"></div>
            <div class="dust"></div>
            <div class="dust"></div>
            <div class="dust"></div>
            <div class="dust"></div>
            <div class="dust"></div>
            <div class="dust"></div>
            <div class="dust"></div>
        </div>

        <!-- Corner paisley motifs -->
        <div class="card-corner tl">
            <svg viewBox="0 0 42 42" xmlns="http://www.w3.org/2000/svg">
                <path d="M4 32 Q4 8 32 4 M4 22 Q10 6 22 4 M10 18 Q18 8 26 8"/>
                <path d="M8 12 Q14 6 22 8" opacity="0.7"/>
                <circle class="filled" cx="10" cy="10" r="1.6"/>
                <circle class="filled" cx="20" cy="6" r="1.2"/>
                <circle class="filled" cx="6" cy="20" r="1.2"/>
            </svg>
        </div>
        <div class="card-corner tr">

    <script>
        // Split-letter reveal for the couple names
        document.querySelectorAll('.split-name').forEach(el => {
            const name = el.getAttribute('data-name') || el.textContent;
            el.textContent = '';
            [...name].forEach((ch, i) => {
                const span = document.createElement('span');
                span.className = 'name-letter';
                span.textContent = ch === ' ' ? ' ' : ch;
                // First name starts at ~1.6s, second at ~2.4s
                const baseDelay = el.classList.contains('name-second') ? 2400 : 1600;
                span.style.transitionDelay = (i * 90) + 'ms';
                setTimeout(() => span.classList.add('revealed'), baseDelay + i * 90);
                el.appendChild(span);
            });
        });

        function enterWithMusic() {
            try { sessionStorage.setItem('rn_music', '1'); } catch (e) {}
            window.location.href = 'wedding.html';
        }

        function enterQuietly() {
            try { sessionStorage.setItem('rn_music', '0'); } catch (e) {}
            window.location.href = 'wedding.html';
        }
    </script>
